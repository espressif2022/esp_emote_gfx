# Publishes Sphinx + Doxygen output from docs/scripts/postprocess_docs.sh to GitHub Pages.
#
# We intentionally do NOT use actions/configure-pages: it calls the REST API to fetch the Pages
# site metadata and returns 404 "Not Found" in some org/repo setups. Pre-built static HTML only
# needs upload-pages-artifact + deploy-pages.
#
# Still required once per repo: Settings → Pages → Source: GitHub Actions (see GitHub Pages docs).
#
# Do not add a second workflow that also deploys to the same "pages" environment (same concurrency group).

name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - feat/update_anim
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate API docs, gettext, Sphinx (en + zh_CN), Doxygen
        shell: bash
        run: |
          bash docs/scripts/postprocess_docs.sh

      - name: Ensure .nojekyll
        run: |
          mkdir -p docs/_build/html
          touch docs/_build/html/.nojekyll

      - name: Show documentation tree
        shell: bash
        run: |
          echo "Contents of docs/_build/html (depth 2):"
          if command -v tree >/dev/null 2>&1; then
            tree -L 2 docs/_build/html
          else
            ls -R docs/_build/html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
