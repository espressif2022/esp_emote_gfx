name: Generate and Deploy Documentation

on:
  push:
    branches: [ main, feat/add_docs ]
  pull_request:
    branches: [ main, feat/add_docs ]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz python3 python3-pip
        pip3 install --user sphinx sphinx_rtd_theme breathe
    
    - name: Generate complete documentation
      run: |
        make -f Makefile.docs clean-docs
        make -f Makefile.docs api-docs
        # Ensure API_REFERENCE.md exists and has content
        cat API_REFERENCE.md
        # Generate Doxygen documentation with API_REFERENCE.md as main page
        doxygen Doxyfile
        # Copy API reference to a more accessible location
        cp API_REFERENCE.md docs/html/api-reference.md
        # List generated files for debugging
        ls -la docs/html/
    
    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './docs/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/html/
