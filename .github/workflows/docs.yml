name: Generate and Deploy Documentation

on:
  push:
    branches: [ main, feat/add_docs ]
  pull_request:
    branches: [ main, feat/add_docs ]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz python3 python3-pip
        pip3 install --user sphinx sphinx_rtd_theme breathe
    
    - name: Generate complete documentation
      run: |
        make -f Makefile.docs clean-docs
        make -f Makefile.docs api-docs
        make -f Makefile.docs doxygen
        cp API_REFERENCE.md docs/html/
        ls -la docs/html/
    
    - name: Deploy to GitHub Pages
      # if: github.ref == 'refs/heads/main'
      if: github.ref == 'refs/heads/feat/add_docs'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/html
        enable_jekyll: false
        force_orphan: true
        commit_message: 'docs: update documentation'
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/html/
