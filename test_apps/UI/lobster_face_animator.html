<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Face Animator Preview</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #09131d;
      color: #eef4ff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .viewer {
      width: 640px;
      max-width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 14px;
      overflow: hidden;
      background:
        radial-gradient(circle at 24% 20%, rgba(133, 215, 255, 0.08), transparent 24%),
        radial-gradient(circle at 76% 18%, rgba(244, 97, 68, 0.10), transparent 24%),
        linear-gradient(180deg, #12202f, #081018);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      position: relative;
      cursor: crosshair;
    }
    svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .btns {
      width: 640px;
      max-width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    button {
      border: 1px solid rgba(255,255,255,0.12);
      background: #1a2a3c;
      color: #dfe9f7;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.active {
      background: #f46144;
      color: white;
      border-color: #ff9b84;
    }
    #hud {
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: #8ea3bd;
      font: 12px ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <div class="viewer" id="viewer">
    <svg viewBox="0 0 320 240" aria-label="Lobster face emote preview">
      <g id="root" transform="translate(160 120)">
        <path id="tail" fill="#f04f3e"></path>
        <path id="body" fill="#e8483b"></path>
        <path id="head" fill="#f46144"></path>
        <path id="clawL" fill="#f65b43"></path>
        <path id="clawR" fill="#f65b43"></path>
        <path id="eyeL" fill="#fffdf8"></path>
        <path id="eyeR" fill="#fffdf8"></path>
        <path id="pupilL" fill="#171717"></path>
        <path id="pupilR" fill="#171717"></path>
      </g>
    </svg>
    <div id="hud"></div>
  </div>

  <div class="btns" id="btns"></div>

  <script>
    const SHELL_BODY = [-32, 0, -24, -32, 24, -32, 32, 0, 24, 32, -24, 32, -32, 0];
    const SHELL_HEAD = [-24, 0, -18, -22, 18, -22, 24, 0, 18, 22, -18, 22, -24, 0];
    const SHELL_TAIL = [-18, 0, -14, -18, 14, -18, 18, 0, 14, 18, -14, 18, -18, 0];
    const PUPIL = [-6, 0, -4, -6, 4, -6, 6, 0, 4, 6, -4, 6, -6, 0];

    const E_BASE = [
      [-16, 0, -8, -16, 8, -16, 16, 0, 8, 16, -8, 16, -16, 0],
      [-16, 4, -8, -10, 8, -10, 16, 4, 8, -4, -8, -4, -16, 4],
      [-16, 2, -9, -14, 9, -14, 16, 2, 9, 8, -9, 8, -16, 2],
      [-16, 8, -8, -10, 8, -14, 16, -2, 8, 16, -8, 16, -16, 8],
      [-14, 0, -7, -24, 7, -24, 14, 0, 7, 24, -7, 24, -14, 0],
      [-16, -2, -8, -8, 8, -18, 16, 6, 8, 10, -8, 10, -16, -2]
    ];

    const C_BASE = [
      [16, 0, 6, -12, -20, -22, -48, -10, -38, 6, -18, 20, 16, 0],
      [18, -2, 8, -16, -24, -26, -54, -16, -44, 10, -18, 24, 18, -2],
      [20, -6, 6, -20, -30, -30, -60, -18, -48, 14, -18, 28, 20, -6],
      [14, 8, 4, -2, -18, -10, -40, -4, -30, 16, -12, 26, 14, 8],
      [22, -8, 6, -26, -34, -38, -68, -22, -54, 18, -18, 34, 22, -8],
      [18, 6, 4, -10, -18, -22, -52, -24, -40, -2, -10, 14, 18, 6]
    ];

    const EXPRESSIONS = [
      { name: "neutral", cn: "平静", sm: 0, hp: 0, sd: 0, su: 0, an: 0, lx: 0, ly: 0 },
      { name: "smile", cn: "友好", sm: 100, hp: 0, sd: 0, su: 0, an: 0, lx: 0, ly: 0 },
      { name: "happy", cn: "开心", sm: 20, hp: 100, sd: 0, su: 0, an: 0, lx: 0, ly: -6 },
      { name: "sad", cn: "委屈", sm: 0, hp: 0, sd: 100, su: 0, an: 0, lx: -6, ly: 8 },
      { name: "surprise", cn: "惊讶", sm: 0, hp: 0, sd: 0, su: 100, an: 0, lx: 0, ly: -12 },
      { name: "angry", cn: "生气", sm: 0, hp: 0, sd: 0, su: 0, an: 100, lx: 0, ly: 0 },
      { name: "look left", cn: "左看", sm: 20, hp: 0, sd: 0, su: 0, an: 0, lx: -18, ly: -2 },
      { name: "look right", cn: "右看", sm: 20, hp: 0, sd: 0, su: 0, an: 0, lx: 18, ly: -2 }
    ];

    const state = {
      eye: [...E_BASE[0]],
      claw: [...C_BASE[0]],
      lx: 0,
      ly: 0
    };

    const target = {
      eye: [...E_BASE[0]],
      claw: [...C_BASE[0]],
      lx: 0,
      ly: 0
    };

    const els = {
      tail: document.getElementById("tail"),
      body: document.getElementById("body"),
      head: document.getElementById("head"),
      clawL: document.getElementById("clawL"),
      clawR: document.getElementById("clawR"),
      eyeL: document.getElementById("eyeL"),
      eyeR: document.getElementById("eyeR"),
      pupilL: document.getElementById("pupilL"),
      pupilR: document.getElementById("pupilR"),
      hud: document.getElementById("hud")
    };

    function blend(base, e) {
      return base[0].map((v, i) =>
        v +
        (base[1][i] - base[0][i]) * e.sm / 100 +
        (base[2][i] - base[0][i]) * e.hp / 100 +
        (base[3][i] - base[0][i]) * e.sd / 100 +
        (base[4][i] - base[0][i]) * e.su / 100 +
        (base[5][i] - base[0][i]) * e.an / 100
      );
    }

    function pathFromBezier(pts, tx = 0, ty = 0, sx = 1, sy = 1, flip = false) {
      const sign = flip ? -1 : 1;
      const p = pts.map((v, i) => {
        if (i % 2 === 0) return tx + v * sx * sign;
        return ty + v * sy;
      });
      return `M ${p[0]} ${p[1]} C ${p[2]} ${p[3]}, ${p[4]} ${p[5]}, ${p[6]} ${p[7]} C ${p[8]} ${p[9]}, ${p[10]} ${p[11]}, ${p[12]} ${p[13]} Z`;
    }

    function setExpression(expr) {
      target.eye = blend(E_BASE, expr);
      target.claw = blend(C_BASE, expr);
      target.lx = expr.lx;
      target.ly = expr.ly;
      els.hud.textContent = `${expr.name} / ${expr.cn}`;
    }

    function easeArr(cur, tgt) {
      for (let i = 0; i < cur.length; i++) {
        const d = tgt[i] - cur[i];
        cur[i] = Math.abs(d) < 0.1 ? tgt[i] : cur[i] + d * 0.25;
      }
    }

    function easeNum(cur, tgt) {
      const d = tgt - cur;
      return Math.abs(d) < 0.1 ? tgt : cur + d * 0.25;
    }

    function render() {
      easeArr(state.eye, target.eye);
      easeArr(state.claw, target.claw);
      state.lx = easeNum(state.lx, target.lx);
      state.ly = easeNum(state.ly, target.ly);

      els.tail.setAttribute("d", pathFromBezier(SHELL_TAIL, 44, -20, 1.9, 1.9));
      els.body.setAttribute("d", pathFromBezier(SHELL_BODY, 0, 8, 2.45, 2.45));
      els.head.setAttribute("d", pathFromBezier(SHELL_HEAD, 0, -34, 2.2, 2.2));
      els.eyeL.setAttribute("d", pathFromBezier(state.eye, -30 + state.lx, -30 + state.ly, 1.7, 1.7));
      els.eyeR.setAttribute("d", pathFromBezier(state.eye, 30 + state.lx, -30 + state.ly, 1.7, 1.7, true));
      els.pupilL.setAttribute("d", pathFromBezier(PUPIL, -30 + state.lx, -18 + state.ly, 1.7, 1.7));
      els.pupilR.setAttribute("d", pathFromBezier(PUPIL, 30 + state.lx, -18 + state.ly, 1.7, 1.7, true));
      els.clawL.setAttribute("d", pathFromBezier(state.claw, -58, 28, 1.6, 1.6));
      els.clawR.setAttribute("d", pathFromBezier(state.claw, 58, 28, 1.6, 1.6, true));

      requestAnimationFrame(render);
    }

    const btns = document.getElementById("btns");
    EXPRESSIONS.forEach((expr, i) => {
      const btn = document.createElement("button");
      btn.textContent = expr.cn;
      btn.onclick = () => {
        document.querySelectorAll("button").forEach(el => el.classList.remove("active"));
        btn.classList.add("active");
        setExpression(expr);
      };
      if (i === 0) btn.classList.add("active");
      btns.appendChild(btn);
    });

    const viewer = document.getElementById("viewer");
    let dragging = false;

    function updateLook(ev) {
      if (!dragging) return;
      const rect = viewer.getBoundingClientRect();
      const nx = ((ev.clientX - rect.left) / rect.width - 0.5) * 2;
      const ny = ((ev.clientY - rect.top) / rect.height - 0.5) * 2;
      target.lx = Math.max(-20, Math.min(20, nx * 20));
      target.ly = Math.max(-16, Math.min(16, ny * 16));
    }

    viewer.addEventListener("pointerdown", (ev) => {
      dragging = true;
      viewer.setPointerCapture(ev.pointerId);
      updateLook(ev);
    });
    viewer.addEventListener("pointermove", updateLook);
    viewer.addEventListener("pointerup", (ev) => {
      dragging = false;
      viewer.releasePointerCapture(ev.pointerId);
    });
    viewer.addEventListener("pointercancel", () => {
      dragging = false;
    });

    setExpression(EXPRESSIONS[0]);
    render();
  </script>
</body>
</html>
