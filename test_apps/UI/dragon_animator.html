<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Tooth (龙牙) - Procedural Animator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root {
            --bg: #0a0f18;
            --panel: rgba(16, 24, 39, 0.85);
            --accent: #ff6b4a;
            --accent-glow: rgba(255, 107, 74, 0.4);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 107, 74, 0.05), transparent 25%),
                radial-gradient(circle at 80% 80%, rgba(133, 215, 255, 0.05), transparent 25%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 720px;
            height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .viewer {
            position: relative;
            width: 100%;
            height: 600px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stage Lighting Effect */
        .viewer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 50% 120%, rgba(255, 107, 74, 0.15), transparent 70%),
                radial-gradient(circle at 50% -20%, rgba(133, 215, 255, 0.1), transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        #dragon-svg {
            width: 85%;
            height: 85%;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
            z-index: 2;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 16px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(8px);
        }

        button {
            padding: 12px 10px;
            background: rgba(20, 30, 45, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
        }

        button:hover {
            background: rgba(255, 107, 74, 0.15);
            color: var(--text);
            border-color: var(--accent);
            transform: translateY(-3px) scale(1.02);
        }

        button.active {
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .status-hud {
            position: absolute;
            top: 24px;
            left: 24px;
            pointer-events: none;
        }

        .status-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .status-val {
            font-size: 18px;
            font-weight: 300;
            color: var(--text);
        }

        /* SVG Part Smoothing */
        .svg-part {
            transform-box: fill-box;
            transform-origin: center;
        }

        .dragon-eye {
            transform-origin: center;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="status-hud">
            <div class="status-label">Current Pose</div>
            <div id="pose-name" class="status-val">Neutral / 中性</div>
        </div>

        <div class="viewer">
            <svg id="dragon-svg" viewBox="120 150 1000 980">
                <defs>
                    <linearGradient id="grad-claw-right" x1="572.14" y1="973.51" x2="832.91" y2="973.51" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#e94138"/><stop offset=".62" stop-color="#f04f3e"/><stop offset="1" stop-color="#f65b43"/>
                    </linearGradient>
                    <radialGradient id="grad-head" cx="564.75" cy="737.28" fx="564.75" fy="737.28" r="387.42" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#dc3336"/><stop offset=".39" stop-color="#e3413a"/><stop offset="1" stop-color="#f46144"/>
                    </radialGradient>
                    <linearGradient id="grad-claw-left" x1="160.47" y1="731.32" x2="406.47" y2="731.32" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#e94138"/><stop offset=".62" stop-color="#f04f3e"/><stop offset="1" stop-color="#f65b43"/>
                    </linearGradient>
                    <linearGradient id="grad-body" x1="824.65" y1="457.03" x2="906.86" y2="372.99" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#dc3336"/><stop offset=".39" stop-color="#e3413a"/><stop offset="1" stop-color="#f46144"/>
                    </linearGradient>
                    <linearGradient id="grad-tail" x1="921.29" y1="378.75" x2="996.95" y2="299.43" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#e94138"/><stop offset=".62" stop-color="#f04f3e"/><stop offset="1" stop-color="#f65b43"/>
                    </linearGradient>
                    <linearGradient id="grad-antenna-left" x1="480.99" y1="355.86" x2="576.14" y2="355.86" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#e94138"/><stop offset=".62" stop-color="#f04f3e"/><stop offset="1" stop-color="#f65b43"/>
                    </linearGradient>
                    <linearGradient id="grad-antenna-right" x1="630.33" y1="358.94" x2="723.86" y2="358.94" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#e94138"/><stop offset=".62" stop-color="#f04f3e"/><stop offset="1" stop-color="#f65b43"/>
                    </linearGradient>
                </defs>

                <!-- Part Groups -->
                <g id="g-claw-left" class="svg-part">
                    <path fill="url(#grad-claw-left)" d="M345.22,642.47c0-11.37.72-22.57,2.1-33.56.29-2.34-1.06-4.57-3.27-5.37-14.46-5.23-30.02-8.09-46.19-8.09-75.37,0-137.39,62.02-137.39,137.39,0,29.22,9.32,57.35,26.07,80.52,12.24,16.94,37,18.27,51.08,2.83l54.3-59.55,4.42,84.69c.89,16.98,16.95,29.1,33.48,25.1,30.23-7.32,56.69-24.76,75.55-48.46,1.46-1.84,1.47-4.45,0-6.27-37.59-46.16-60.14-105.05-60.14-169.22Z"/>
                </g>

                <g id="g-body" class="svg-part">
                    <path fill="url(#grad-body)" d="M900.97,539.29c-38.15-89.02-92.78-136.66-155.82-162.53-3.36-1.38-4.2-5.74-1.57-8.25l52.45-49.94c19.57-18.63,50.36-18.46,69.72.39l97.36,94.79c20.38,19.84,20.6,52.51.49,72.62l-54.5,54.5c-2.5,2.5-6.73,1.68-8.13-1.58Z"/>
                </g>

                <g id="g-tail" class="svg-part">
                    <path fill="url(#grad-tail)" d="M861,296.72c53.35,41.85,101.1,84.8,132.13,131.04,3.22,4.8,9.08,7.11,14.71,5.79l67.83-15.88c32.23-7.54,35.63-41.08,17.33-66.41-39.18-54.2-96.65-108.87-151.87-150.72-24.12-18.29-52.18-9.98-62.4,18.52l-22.24,62.02c-2.02,5.63-.21,11.93,4.5,15.62Z"/>
                    <rect fill="#1a1a1a" transform="rotate(-44, 935, 276)" x="891" y="221" width="128" height="18" rx="4"/>
                    <rect fill="#1a1a1a" transform="rotate(-44, 1005, 345)" x="958" y="287" width="131" height="18" rx="4"/>
                </g>

                <g id="g-antenna" class="svg-part">
                    <path fill="none" stroke="url(#grad-antenna-left)" stroke-width="30" stroke-linecap="round" d="M520.87,456.53c-73.87-130.46,40.27-201.36,40.27-201.36"/>
                    <path fill="none" stroke="url(#grad-antenna-right)" stroke-width="30" stroke-linecap="round" d="M708.84,258.48c1.9-6.49-110.79,59.43-40.27,201.36"/>
                </g>

                <g id="g-head" class="svg-part">
                    <path fill="url(#grad-head)" d="M698.92,823.06c33.31,0,63.97,10.67,88.39,28.59,1.92,1.41,4.55,1.42,6.46-.02,63.44-47.6,105.09-122.65,107.3-207.53,4.05-155.38-121.91-280.37-277.26-275.17-143.9,4.82-259.07,122.99-259.07,268.06,0,124.74,85.16,229.57,200.51,259.57,2.84.74,5.83-.49,7.31-3.02,24.59-42.02,71.95-70.47,126.35-70.47Z"/>
                    
                    <g id="g-eye-left" class="dragon-eye">
                        <ellipse fill="#fff" cx="478.47" cy="652.4" rx="58.27" ry="86.64"/>
                        <path fill="none" stroke="#191919" stroke-width="20" stroke-linecap="round" d="M446.38,665.79c5.69-42.61,55.93-40.58,61.22,0"/>
                    </g>
                    <g id="g-eye-right" class="dragon-eye">
                        <ellipse fill="#fff" cx="632.96" cy="652.4" rx="58.27" ry="86.64"/>
                        <path fill="none" stroke="#191919" stroke-width="20" stroke-linecap="round" d="M602.35,665.79c5.69-42.61,55.93-40.58,61.22,0"/>
                    </g>
                </g>

                <g id="g-claw-right" class="svg-part">
                    <path fill="url(#grad-claw-right)" d="M675.01,973.51h-83.14c-12.21,0-21.58-11.02-19.41-23.04,11.02-61.18,65.05-108.22,129.2-108.22,72,0,131.25,59.25,131.25,131.25s-59.25,131.25-131.25,131.25c-34.91,0-68.14-13.93-92.55-38.18-7.75-7.7-7.75-20.23.02-27.91l65.88-65.16Z"/>
                </g>

                <g id="g-dots" class="svg-part">
                    <circle fill="#f74c49" cx="872.27" cy="846.44" r="27.29"/>
                    <circle fill="#f74c49" cx="915.29" cy="784.26" r="27.29"/>
                    <circle fill="#f74c49" cx="939.83" cy="714.19" r="27.29"/>
                </g>
            </svg>
        </div>

        <div class="controls" id="btn-container">
            <!-- Buttons dynamically generated -->
        </div>
    </div>

    <script>
        /**
         * Dragon Tooth (龙牙) - Static Redesign
         * Purely state-based movement with holistic skeletal coordination.
         */

        const parts = {
            head:    { el: 'g-head',    cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            body:    { el: 'g-body',    cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            tail:    { el: 'g-tail',    cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            clawL:   { el: 'g-claw-left', cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            clawR:   { el: 'g-claw-right', cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            antenna: { el: 'g-antenna', cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            eyeL:    { el: 'g-eye-left', cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            eyeR:    { el: 'g-eye-right', cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } },
            dots:    { el: 'g-dots',    cur: { x:0, y:0, r:0, s:1 }, tgt: { x:0, y:0, r:0, s:1 } }
        };

        const poses = [
            {
                name: "01. Home / 待机",
                states: { head: {y:0}, body:{y:0}, tail:{y:0}, antenna:{y:0}, clawL:{x:0}, clawR:{x:0} }
            },
            {
                name: "02. High / 高昂",
                states: { 
                    head: { y: -60, r: -5, s: 1.05 }, 
                    antenna: { y: -20, r: 15, s: 1.1 }, 
                    body: { y: -30, r: -2 }, 
                    tail: { y: 20, r: -10 },
                    clawL: { x: -20, r: 10 }, clawR: { x: 20, r: -10 }
                }
            },
            {
                name: "03. Low / 沉稳",
                states: { 
                    head: { y: 50, r: 5, s: 0.98 }, 
                    body: { y: 30, r: 2 }, 
                    tail: { y: -20, r: 10 },
                    antenna: { r: -15, s: 0.9 },
                    clawL: { y: 20 }, clawR: { y: 20 }
                }
            },
            {
                name: "04. Left / 侧望(左)",
                states: { 
                    head: { x: -60, r: -10 }, 
                    body: { x: -20, r: -5 }, 
                    tail: { x: 30, r: 5 },
                    eyeL: { x: -15 }, eyeR: { x: -15 },
                    antenna: { x: -10, r: -5 }
                }
            },
            {
                name: "05. Right / 侧望(右)",
                states: { 
                    head: { x: 60, r: 10 }, 
                    body: { x: 20, r: 5 }, 
                    tail: { x: -30, r: -5 },
                    eyeL: { x: 15 }, eyeR: { x: 15 },
                    antenna: { x: 10, r: 5 }
                }
            },
            {
                name: "06. Alert / 警戒",
                states: { 
                    head: { y: -30, s: 1.1 }, 
                    eyeL: { s: 1.2 }, eyeR: { s: 1.2 },
                    antenna: { r: 40, s: 1.4 },
                    body: { s: 1.05 },
                    dots: { y: -60, r: 15 }
                }
            },
            {
                name: "07. Fear / 畏缩",
                states: { 
                    head: { y: 180, s: 0.85, r: -10 }, 
                    body: { y: 80, s: 0.9, x: -30 }, 
                    tail: { x: 80, r: -30 },
                    antenna: { r: -40, s: 0.7 },
                    clawL: { x: 40, y: 30 }, clawR: { x:-40, y:30 }
                }
            },
            {
                name: "08. Curious / 好奇",
                states: { 
                    head: { x: 90, y: -20, r: 12 }, 
                    body: { x: 40, r: 8 }, 
                    eyeL: { s: 1.2, x: 10 }, eyeR: { s: 1.2, x: 10 },
                    antenna: { r: 20 }
                }
            },
            {
                name: "09. Proud / 傲岸",
                states: { 
                    head: { y: -100, s: 1.05 }, 
                    body: { s: 1.15, y: -40 }, 
                    clawL: { x: -80, y: 50, r: -15 }, clawR: { x: 80, y: 50, r: 15 },
                    tail: { r: -15, y: 30 }
                }
            },
            {
                name: "10. Sneak / 潜伏",
                states: { 
                    head: { y: 140, r: 20, x: 50 }, 
                    body: { y: 60, x: -20, s: 0.8 }, 
                    eyeL: { s: 0.5, y: 10 }, eyeR: { s: 0.5, y: 10 },
                    tail: { r: 40, x: -50 }
                }
            },
            {
                name: "11. Angry / 愤怒",
                states: { 
                    head: { s: 1.2, r: 0 }, 
                    antenna: { r: 60, s: 1.5 }, 
                    eyeL: { s: 0.6, y: -15 }, eyeR: { s: 0.6, y: -15 },
                    dots: { y: -90, s: 1.3, r: 10 },
                    clawL: { r: 25 }, clawR: { r: -25 }
                }
            },
            {
                name: "12. Tired / 困顿",
                states: { 
                    head: { y: 100, r: -8, s: 0.95 }, 
                    body: { y: 40, s: 0.92 }, 
                    antenna: { r: -35, s: 0.8 },
                    eyeL: { s: 0.2 }, eyeR: { s: 0.2 }
                }
            },
            {
                name: "13. Happy / 欣喜",
                states: { 
                    head: { y: -40, r: 5, s: 1.08 }, 
                    body: { y: -10, s: 1.05 }, 
                    tail: { r: 25, x: -20 },
                    clawL: { y: -50, r: 15 }, clawR: { y: -50, r: -15 }
                }
            },
            {
                name: "14. Think / 深思",
                states: { 
                    head: { x: -40, r: -15 }, 
                    body: { x: 20, r: 10 }, 
                    antenna: { r: 12 },
                    clawL: { x: 80, y: -120, r: -45 }
                }
            },
            {
                name: "15. Guard / 后撤",
                states: { 
                    head: { x: -120, y: 40, r: -10 }, 
                    body: { x: -80, y: 20 }, 
                    tail: { x: -120, r: 15 },
                    clawL: { r: 35 }, clawR: { r: 15 }
                }
            }
        ];

        let currentPoseIndex = 0;
        const damping = 0.12; 

        function applyPose(index) {
            currentPoseIndex = index;
            const pose = poses[index];
            document.getElementById('pose-name').innerText = pose.name;
            
            // Holistic reset
            Object.keys(parts).forEach(key => {
                parts[key].tgt = { x:0, y:0, r:0, s:1 };
            });

            // Target mapping
            Object.keys(pose.states).forEach(key => {
                if (parts[key]) {
                    Object.assign(parts[key].tgt, pose.states[key]);
                }
            });
        }

        function ease(curObj, tgtObj) {
            Object.keys(tgtObj).forEach(key => {
                const diff = tgtObj[key] - curObj[key];
                if (Math.abs(diff) > 0.0001) {
                    curObj[key] += diff * damping;
                } else {
                    curObj[key] = tgtObj[key];
                }
            });
        }

        function tick() {
            // NO LOOPING ANIMATION HERE - PURELY STATIC TRANSITIONS
            Object.keys(parts).forEach(key => {
                const part = parts[key];
                const el = document.getElementById(part.el);
                if (!el) return;

                ease(part.cur, part.tgt);

                const c = part.cur;
                el.style.transform = `translate(${c.x}px, ${c.y}px) rotate(${c.r}deg) scale(${c.s})`;
            });
            
            requestAnimationFrame(tick);
        }

        // Generate Stage Buttons
        const container = document.getElementById('btn-container');
        poses.forEach((pose, i) => {
            const btn = document.createElement('button');
            btn.innerText = pose.name.split('.')[1].split('/')[1] || pose.name;
            btn.onclick = () => {
                document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyPose(i);
            };
            if (i === 0) btn.classList.add('active');
            container.appendChild(btn);
        });

        // Initialize state
        applyPose(0);
        tick();

        // One-time interactive look (no persistent loop)
        const viewer = document.querySelector('.viewer');
        viewer.addEventListener('mousemove', (e) => {
            if (currentPoseIndex !== 0) return; // Only allow track in Home for clarity
            const rect = viewer.getBoundingClientRect();
            const relX = (e.clientX - rect.left) / rect.width - 0.5;
            const relY = (e.clientY - rect.top) / rect.height - 0.5;
            
            parts.eyeL.tgt.x = relX * 30;
            parts.eyeL.tgt.y = relY * 30;
            parts.eyeR.tgt.x = relX * 30;
            parts.eyeR.tgt.y = relY * 30;
        });

        viewer.addEventListener('mouseleave', () => {
             parts.eyeL.tgt.x = 0; parts.eyeL.tgt.y = 0;
             parts.eyeR.tgt.x = 0; parts.eyeR.tgt.y = 0;
        });

    </script>
</body>
</html>
