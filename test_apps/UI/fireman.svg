<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="4" stroke-linecap="round" fill="none">
    
    <!-- Head -->
    <circle id="head" cx="100" cy="50" r="20"/>

    <!-- Body -->
    <line id="spine" x1="100" y1="70" x2="100" y2="170"/>

    <!-- Arms -->
    <line id="arm_left"  x1="100" y1="100" x2="60"  y2="140"/>
    <line id="arm_right" x1="100" y1="100" x2="140" y2="140"/>

    <!-- Legs -->
    <line id="leg_left"  x1="100" y1="170" x2="70"  y2="230"/>
    <line id="leg_right" x1="100" y1="170" x2="130" y2="230"/>

  </g>
</svg>